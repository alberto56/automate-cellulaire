    description: |
      A distributed search effort set
      up by Nathaniel Johnston in 2009, using a Python script running in
      [Golly](/patterns/golly).  Results included a collection of the longest-lived 20x20
      soups, as well as a [census](/patterns/census) of over 174 billion [ash](/patterns/ash) objects.  It
