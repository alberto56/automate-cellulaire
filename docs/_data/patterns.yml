      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      (p1)  This [eater](/patterns/eater) was found by Dave Buckingham in the 1970s.
      Mostly it works like the ordinary [eater1](/patterns/eater1) but with two slight
      differences that make it useful despite its size: it takes longer to
      recover from each bite, and it can eat objects appearing at two
      different positions.
    variants:
    - pattern:
      - ".*.*..."
      - "**.***."
      - "......*"
      - "**.***."
      - ".*.*..."
      - ".*.*..."
      - "..*...."
      description: |
        The first property means that, among other things, it can eat a
        [glider](/patterns/glider) in a position that would destroy an [eater1](/patterns/eater1).  This novel
        glider-eating action is occasionally of use in itself, and combined
        with the symmetry means that an eater2 can eat gliders travelling
        along four adjacent glider [lane](/patterns/lane)s, as shown below.
        The following eater2 variant (Stephen Silver, May 1998) can be
        useful for obtaining smaller [bounding box](/patterns/bounding-box)es.  A more compact
        variant with the same purpose can be seen under [gliderless](/patterns/gliderless).
