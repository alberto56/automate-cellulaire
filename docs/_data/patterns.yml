      - "..*.*..."
      - "......*."
      - "**......"
      - "......**"
      - ".*......"
      - "...*.*.."
      - "...*...."
      description: |
        This is [extensible](/patterns/extensible) and is just the first of a family of phoenixes
        made by joining [component](/patterns/component)s together to form a loop.  Here is
        another member of this family.
    - pattern:
