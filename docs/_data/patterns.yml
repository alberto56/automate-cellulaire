      periods 52, 57, 58, 59 and 61 are emus.  See also [Quetzal](/patterns/quetzal).
  - name: emulator
    id: emulator
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      Any one of three p4 oscillators that produce [spark](/patterns/spark)s
      similar to those produced by [LWSS](/patterns/lwSs), [MWSS](/patterns/mwSs) and [HWSS](/patterns/hwSs).  See
      [LW emulator](/patterns/lw-emulator), [MW emulator](/patterns/mw-emulator) and [HW emulator](/patterns/hw-emulator).  Larger emulators are
      also possible, but they require stabilizing objects to suppress their
      [non-spark](/patterns/non-spark)s and so are of little use.  The emulators were discovered
      by Robert Wainwright in June 1980.
  - name: engine
    id: engine
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      The active portion of an object (usually a [puffer](/patterns/puffer) or [gun](/patterns/gun))
      which is considered to actually produce its output, and which
      generally permits no variation in how it works.  The other parts of
      the object are just there to support the engine.  For examples, see
      [puffer train](/patterns/puffer-train), [Schick engine](/patterns/schick-engine), [blinker puffer](/patterns/blinker-puffer), [frothing puffer](/patterns/frothing-puffer)
      and [line puffer](/patterns/line-puffer).
  - name: engineless
    id: engineless
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A [rake](/patterns/rake) or [puffer](/patterns/puffer) which does not contain a specific
      [engine](/patterns/engine) for its operation.  Instead it depends on perturbations of
      gliders or other objects by passing spaceships.  The period of such
      objects is often adjustable, and in some cases the speed as well.  An
      early example was the creation of c/5 rakes in September 1997, using
      gliders circulating among a convoy of c/5 spaceships.  More recently,
      the passing spaceships themselves are also constructed, as in the
      [Caterloopillar](/patterns/caterloopillar).
