  - name: mosquito1
    id: mosquito1
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A [breeder](/patterns/breeder) constructed by Nick Gotts in September 1998.
      The original version had an initial population of 103, which was then
      the smallest for any known pattern with superlinear growth (beating
      the record previously held by [Jaws](/patterns/jaws)).  This was reduced to 97 by
      Stephen Silver the following month, but was then almost immediately
      superseded by [mosquito2](/patterns/mosquito2).
      Mosquito1 consists of the classic [puffer train](/patterns/puffer-train) plus four [LWSS](/patterns/lwSs)
      and four [MWSS](/patterns/mwSs) (mostly in [predecessor](/patterns/predecessor) form, to keep the population
      down).  Once it gets going it produces a new block-laying
      [switch engine](/patterns/switch-engine) (plus a lot of junk) every 280 generations.  It is
      therefore an MMS breeder, albeit a messy one.
