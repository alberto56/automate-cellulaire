  - name: reflectorless rotating oscillator
    id: reflectorless-rotating-oscillator
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A pattern that rotates itself 90 or
      180 degrees after some number of [generation](/patterns/generation)s, with the additional
      constraint that multiple non-interacting copies of the pattern can be
      combined into a new oscillator with a period equal to the appropriate
      fraction of the component oscillators' period. The second constraint
      disqualifies small time-symmetric [oscillator](/patterns/oscillator)s such as the [blinker](/patterns/blinker)
      and [monogram](/patterns/monogram).
      A working RRO might look something like a [pi orbital](/patterns/pi-orbital) or
      [p256 gun](/patterns/p256-gun) loop containing one or more [pi](/patterns/pi)s or [Herschel](/patterns/herschel)s in the
      same loop, but without any external stabilisation mechanism.  Such
      patterns can be proven to exist (see [universal constructor](/patterns/universal-constructor)), but as
      of June 2018 none have been explicitly constructed in Life.  There is
      no upper limit on [multiplicity](/patterns/multiplicity) for a constructor-based RRO.
