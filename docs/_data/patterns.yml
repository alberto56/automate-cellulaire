  - name: Herschel great-grandparent
    id: herschel-great-grandparent
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A specific three-[tick](/patterns/tick) predecessor of a
      [Herschel](/patterns/herschel), commonly seen in [Herschel conduit](/patterns/herschel-conduit) collections that
      contain [dependent conduit](/patterns/dependent-conduit)s.  In some situations it is helpful to
      display the input reaction in this form instead of the standard
      Herschel form.
    variants:
    - pattern:
      - ".**...."
      - "***.**."
      - ".**.***"
      - "***.**."
      - "**....."
      description: |
        Dependent conduit inputs are catalysed by a [transparent](/patterns/transparent) block
        before the Herschel's standard form can appear, and before the
        Herschel's [first natural glider](/patterns/first-natural-glider) is produced.  This means that these
        conduits will fail if an actual Herschel is placed in the "correct"
        input location for a dependent conduit.  Refer to [F166](/patterns/f166) or [Lx200](/patterns/lx200)
        to see the correct relative placement of the standard transparent
        block catalyst.
        Almost all known Herschel conduits produce a Herschel
        great-grandparent near the end of their evolutionary sequence.  In
        the original [universal](/patterns/universal) set of Herschel conduits, [Fx158](/patterns/fx158) is the
        only exception.
  - name: Herschel loop
    id: herschel-loop
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A cyclic [Herschel track](/patterns/herschel-track).  Although no loop of length
      less than 120 generations has been constructed it is possible to make
      [oscillator](/patterns/oscillator)s of smaller periods by putting more than one Herschel in
      a higher-period track.  In this way oscillators, and in most cases
      [gun](/patterns/gun)s, of all periods from 54 onwards can now be constructed
      (although the p55 case is a bit strange, shooting itself with gliders
      in order to stabilize itself).  A mechanism for a period-52 loop was
      found in April 2018, but it includes a stage where the signal is
      carried by a triplet of [glider](/patterns/glider)s so it may not be considered to be a
      pure Herschel loop.  The missing period, 53, is a difficult case
      simply because 53 is prime and so no small sparkers or reflectors are
      available.
      See [Simkin glider gun](/patterns/simkin-glider-gun) and [p256 gun](/patterns/p256-gun) for the smallest known
      Herschel loops.  See also [emu](/patterns/emu) and [omniperiodic](/patterns/omniperiodic).
  - name: Herschel-pair climber
    id: herschel-pair-climber
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      Any [reburnable fuse](/patterns/reburnable-fuse) reaction involving pairs
      of [Herschel](/patterns/herschel)s.  May refer specifically to the
      [31c/240 Herschel-pair climber](/patterns/31c/240-herschel-pair-climber) used in the [Centipede](/patterns/centipede), or one of
      several similar reactions with various velocities.  See also
      [Herschel climber](/patterns/herschel-climber).
  - name: Herschel receiver
    id: herschel-receiver
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      Any [circuit](/patterns/circuit) that converts a [tandem glider](/patterns/tandem-glider) into
      a [Herschel](/patterns/herschel) [signal](/patterns/signal).  The following diagram shows a pattern found
      by Paul Callahan in 1996, as part of the first stable glider
