      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A [spaceship](/patterns/spaceship) is said to be non-monotonic if its
      leading edge falls back in some generations.  The first example
      (shown below) was found by Hartmut Holzwart in August 1992.  This is
      p4 and travels at c/4.  In April 1994, Holzwart found examples of p3
      spaceships with this property, and this is clearly the smallest
      possible period.  Another non-monotonic spaceship is the [weekender](/patterns/weekender).
    variants:
    - pattern:
      - "..........**.*......."
      - "......***.*.***......"
      - "..*.*..........*...**"
      - "**....**.....*...****"
      - "..*.**..*....***.*..."
      - "........*....*......."
      - "..*.**..*....***.*..."
      - "**....**.....*...****"
      - "..*.*..........*...**"
      - "......***.*.***......"
      - "..........**.*......."
  - name: nonomino switch engine predecessor
    id: nonomino-switch-engine-predecessor
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      This is the unique nonomino (a
      [polyomino](/patterns/polyomino) having 9 cells) whose [evolution](/patterns/evolution) results in a
      [switch engine](/patterns/switch-engine), and the smallest polyomino to do so.
    variants:
    - pattern:
      - ".**..."
      - "..*.*."
      - "..****"
      description: |
        Charles Corderman may have found this object in 1971 while
        exhaustively investigating the [fate](/patterns/fate) of all the small [polyomino](/patterns/polyomino)es.
        Records indicate that he found the [switch engine](/patterns/switch-engine) while
        investigating the decominoes (polyominoes having 10 cells). However,
        there do not appear to be decominoes which result in a [clean](/patterns/clean)
        [switch engine](/patterns/switch-engine).  If Corderman was examining polyominoes in order of
        size, then this smaller [predecessor](/patterns/predecessor) should have been found first in
        any case.
