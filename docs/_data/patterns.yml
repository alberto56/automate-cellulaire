  - name: freeze-dried
    id: freeze-dried
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A term used for a [glider constructible](/patterns/glider-constructible) [seed](/patterns/seed) that can
      activated in some way to produce a complex object.  For example, a
      "freeze-dried salvo" is a constellation of constructible objects
      which, when [trigger](/patterns/trigger)ed by a single glider, produces a unidirectional
      glider [salvo](/patterns/salvo), and nothing else.  Freeze-dried salvos can be useful
      in [slow salvo](/patterns/slow-salvo) constructions, especially when an active circuit has
      to destroy or reconstruct itself in a limited amount of time.
      Gradual modification by a [construction arm](/patterns/construction-arm) may be too slow, or the
      circuit doing the construction may itself be the object that must be
      modified.
      The concept may be applied to other types of objects.  For example,
      one possible way to build a gun for a [waterbear](/patterns/waterbear) would be to program
      a construction arm to build a freeze-dried waterbear seed, and then
      trigger it when the construction is complete.
