  - name: lifesrc
    id: lifesrc
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      David Bell's Life [search program](/patterns/search-program) for finding new
      [spaceship](/patterns/spaceship)s and [oscillator](/patterns/oscillator)s.  This is a C implementation of an
      algorithm developed by Dean Hickerson in 6502 assembler.
      Although lifesrc itself is a command-line program, Jason Summers
      has made a GUI version called [WinLifeSearch](/patterns/winlifesearch) for Microsoft Windows.
      A Java version, [JavaLifeSearch](/patterns/javalifesearch), was written in November 2012 by
      Karel Suhajda.
      The lifesrc algorithm is only useful for very small periods, as the
      amount of computing power required rises rapidly with increasing
      period.  For most purposes, period 7 is the practical limit with
      current hardware.
      Lifesrc is available from [http://tip.net.au/~dbell/](/patterns/http://tip.net.au/~dbell/) (source code
      only).  Compare [gfind](/patterns/gfind).
