    description: |
      (2c/7, p16982)  The first orthogonal 2c/7 rake,
      constructed by Ivan Fomichev on May 22nd, 2014.  It uses the weak
      [spark](/patterns/spark)s from [weekender](/patterns/weekender)s to perturb an LWSS into an active reaction
