  - name: omniperiodic
    id: omniperiodic
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A [cellular automaton](/patterns/cellular-automaton) is said to be omniperiodic if it
      has [oscillator](/patterns/oscillator)s of all [period](/patterns/period)s. It is not known if Life is
      omniperiodic, although this seems likely.  Dave Buckingham's work on
      Herschel conduits in 1996 (see
      [My Experience with B-heptominos in Oscillators](/patterns/my-experience-with-b-heptominos-in-oscillators)) left only a short
      list of unresolved cases, all with periods of 58 or below.  The list
      has been progressively reduced since then.  Most recently, period 43
      and 53 oscillators were made possible in 2013 by Mike Playle's
      [Snark](/patterns/snark).  As of June 2018, no oscillators are known for periods 19,
      23, 38, or 41.  If we insist that the oscillator must be
      [non-trivial](/patterns/non-trivial), then 34 should be added to this list.
      Note that if we were to allow infinite oscillators, then all
      periods are certainly possible, as any period of 14 or more can be
      obtained using a [glider](/patterns/glider) (or [LWSS](/patterns/lwSs)) stream, or an infinitely long
      [2c/3](/patterns/2c/3) wire containing signals with the desired separation.
