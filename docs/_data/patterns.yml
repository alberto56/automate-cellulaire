  - name: Orthogonoid
    id: orthogonoid
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      (256c/3476016, p3476016)  A [self-constructing](/patterns/self-constructing)
      [spaceship](/patterns/spaceship) analogous to the [Demonoid](/patterns/demonoid)s, with a slow orthogonal
      direction of travel.  The first example was completed by Dave Greene
      on 29 June 2017, with a top speed of 16c/217251 (this is just
      256c/3476016 in lowest terms).
      The construction recipe is a stream of MWSSes, with the recovery
      time limited to 90 ticks by the [Lx200](/patterns/lx200) [dependent conduit](/patterns/dependent-conduit) that
      follows the initial [syringe](/patterns/syringe) converter.  The design is
      [hashlife](/patterns/hashlife)-friendly, meaning that the spaceship can be trivially
      adjusted so that spatial and temporal offsets are exact powers of
      two; period 4194304 and period 8388608 versions have been
      constructed, with speeds of c/16384 and c/32768 respectively.
      The MWSSes are converted to [Herschel](/patterns/herschel)s, which produce a standard
      [single-channel](/patterns/single-channel) glider stream that runs the Orthogonoid's single
      construction arm.  After the child circuitry is complete, a
      previously constructed [Snark](/patterns/snark) in the parent is removed from the
      construction arm lane, converting it to a "destruction arm" that
      shoots down the previous constructor/reflector in the series.
  - name: oscillator
    id: oscillator
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      Any pattern that is a [predecessor](/patterns/predecessor) of itself.  The term
      is usually restricted to non-[stable](/patterns/stable) finite patterns; period 1
      oscillators are [stable](/patterns/stable) and are usually just called [still life](/patterns/still-life)s.
      The [blinker](/patterns/blinker) is the smallest non-stable oscillator, having period 2.
      There are oscillators of almost all higher periods (see
      [omniperiodic](/patterns/omniperiodic)).  In general [cellular automaton](/patterns/cellular-automaton) theory the term
      "oscillator" usually covers [spaceship](/patterns/spaceship)s as well, but this usage is
      not normal in Life.
      Oscillators consisting of separate objects which do not react in
      any phase are usually ignored.  For example, a separated [blinker](/patterns/blinker)
      and [pulsar](/patterns/pulsar) makes a period 6 oscillator, but is considered
      [trivial](/patterns/trivial).
      An oscillator can be divided into a [rotor](/patterns/rotor) and a [stator](/patterns/stator), and the
      stator can be further subdivided into [bushing](/patterns/bushing) and [casing](/patterns/casing).  Some
      oscillators have no casing cells, and a few 100%-[volatility](/patterns/volatility)
      oscillators also have no bushing cells.
      An oscillator can be constructed from any [gun](/patterns/gun) as long as [eater](/patterns/eater)s
      can be added to consume its output.  If it is a [true](/patterns/true) [gun](/patterns/gun) then the
      period of the oscillator will be the same as the gun - unless the
      eating mechanism multiplies the period, as in the case of gliders
      caught by a [boat-bit](/patterns/boat-bit).
      With the discovery of [reflector](/patterns/reflector)s, [relay](/patterns/relay)s provide an easy way to
      create oscillators of all large periods.  For example, eight gliders
      travelling in a loop created by four [Snark](/patterns/snark)s can create any period
      above 42, with a population never exceeding 356 live cells.
      For the very lowest periods, whole families of [extensible](/patterns/extensible)
      oscillators are known.  Examples of this are [barberpole](/patterns/barberpole), [cross](/patterns/cross),
      [pentoad](/patterns/pentoad), [p6 shuttle](/patterns/p6-shuttle), [snacker](/patterns/snacker), and [multiple roteightors](/patterns/multiple-roteightors).  Any
      of the [shuttle](/patterns/shuttle)s are oscillators by definition, for example the
      [queen bee shuttle](/patterns/queen-bee-shuttle).  Many of these are also extensible.  Other
      oscillators such as [figure-8](/patterns/figure-8) and [tumbler](/patterns/tumbler) have unique mechanisms
      that are not part of an extended family.
      Some oscillators are useful because of the [perturbation](/patterns/perturbation)s they can
      cause to other objects.  This is especially true if they provide a
      [spark](/patterns/spark) on their boundary.  Some oscillators are explicitly found by
      [search program](/patterns/search-program)s in order to produce these sparks, such as
      [pipsquirter](/patterns/pipsquirter)s.
      Some higher period oscillators have been found while running random
      [soup](/patterns/soup)s.  This is especially true if the soup is run on a cylindrical
      or torus [universe](/patterns/universe).  Sometimes the found objects can be moved to the
      normal universe and supported there by added [catalyst](/patterns/catalyst)s.
      [Achim's p144](/patterns/achim-s-p144) is an example.
  - name: Osqrtlogt
    id: osqrtlogt
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      (p1 circuitry)  A pattern constructed by Adam P. Goucher in
      2010, which uses an unbounded triangular region as memory for a
      binary counter.  Empty space is read as a zero, and a boat as a one,
      as shown in the example pattern in [memory cell](/patterns/memory-cell).  The pattern's
      diametric growth rate is O(sqrt(log(t))), which is the slowest
      possible for any Life pattern, or indeed any 2D Euclidean cellular
      automaton.  The population returns infinitely often to its initial
      minimum value (during carry operations from 11111    - "..."1 to 100000    - "..."0,
      so it can be considered to be an unusual form of [sawtooth](/patterns/sawtooth).
  - name: OTCA metapixel
    id: otca-metapixel
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      (p46 circuitry)  A 2048 x 2048 period 35328 [metacell](/patterns/metacell)
      constructed by Brice Due in 2006.  It contains a large "pixel" area
      that contains a large population of [LWSS](/patterns/lwSs)es when the metacell state
      is ON, but is empty when it is OFF.  This allows the state of the
      metacell to be visible at high zoom levels, unlike previous
      [unit cell](/patterns/unit-cell)s where the state was signaled by the presence or absence
      of a single glider in a specific location.
  - name: out of the blue
    id: out-of-the-blue
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      See [natural Heisenburp](/patterns/natural-heisenburp).  Other similar mechanisms,
      particularly the method of [LWSS](/patterns/lwSs) creation used in the pixel part of
      the [OTCA metapixel](/patterns/otca-metapixel), may also be referred to as "out of the blue" reactions.
  - name: overclocking
    id: overclocking
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A term used when a [circuit](/patterns/circuit) can accept a signal at a
      specific period which it cannot accept at a higher period.  A
      [syringe](/patterns/syringe) is a simple example.
      Some [staged recovery](/patterns/staged-recovery) circuits also permit overclocking, and can
      function successfully at a rate faster than their [recovery time](/patterns/recovery-time).  A
      [Silver reflector](/patterns/silver-reflector) has a recovery time of 497 ticks, but can be
      overclocked to reflect a period 250 glider stream, or any nearby
      period above 248, simply by removing a beehive after the first glider
      enters the reflector.  However, a continuous stream of gliders is
      then required to maintain the circuit, with timing within a tightly
      bounded range.
