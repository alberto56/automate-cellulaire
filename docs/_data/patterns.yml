  - name: Seeds of Destruction Game
    id: seeds-of-destruction-game
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      An interactive search application written
      by Paul Chapman in 2013.  Its primary purpose was to assist in the
      design of self-destruct circuits in self-constructing circuitry.  It
      has also regularly been helpful in completing glider syntheses, and
      was used to find the [31c/240](/patterns/31c/240) base reaction for the [shield bug](/patterns/shield-bug) and
      [Centipede](/patterns/centipede) spaceships.
  - name: self-constructing
    id: self-constructing
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A type of pattern, generally a [macro-spaceship](/patterns/macro-spaceship),
      that contains encoded construction information about itself, and
      makes a complete copy of itself using those instructions.  The
      [Gemini](/patterns/gemini), [linear propagator](/patterns/linear-propagator), [spiral growth](/patterns/spiral-growth) patterns, [Demonoid](/patterns/demonoid)s
      and [Orthogonoid](/patterns/orthogonoid) are examples of self-constructing patterns.
      Self-constructing spaceships often have trivially adjustable speeds.
      In many cases, the direction of travel can also be altered, less
      easily, by changing the encoded [construction recipe](/patterns/construction-recipe).  Compare
      [self-supporting](/patterns/self-supporting), [elementary](/patterns/elementary).
  - name: self-supporting
    id: self-supporting
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A type of pattern, specifically a [macro-spaceship](/patterns/macro-spaceship),
      that constructs [signal](/patterns/signal)s or [track](/patterns/track)s or other scaffolding to assist
      its movement, but does not contain complete information about its own
      structure.  Examples include the Caterpillar, [Centipede](/patterns/centipede),
      [half-baked knightship](/patterns/half-baked-knightship), [waterbear](/patterns/waterbear), and the [Caterloopillar](/patterns/caterloopillar)s.
      [Caterpillar](/patterns/caterpillar) has been used as a general term for self-supporting
      spaceships, but it is not very appropriate for the HBKs.
      In general a self-supporting pattern cannot be trivially adjusted
      to alter its speed or direction.  The variable speeds of the HBKs and
      the Caterloopillars are exceptions, but their direction of travel is
      fixed, and a specific Caterloopillar can't be made to change its
      speed without completely rebuilding it.  Compare [self-constructing](/patterns/self-constructing),
      [elementary](/patterns/elementary).
