    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A common [predecessor](/patterns/predecessor) of the [pulsar](/patterns/pulsar), such as that shown
      below.  This duplicates itself in 15 generations.  (It fails,
      however, to be a true [replicator](/patterns/replicator) because of the way the two copies
      then interact.)
    variants:
    - pattern:
      - "***...***"
      - "*.*...*.*"
      - "***...***"
      description: |
        A pair of [tub](/patterns/tub)s can be placed to eat half the pre-pulsar as it
        replicates; this gives the p30 oscillator [Eureka](/patterns/eureka) where the
        pre-pulsar's replication becomes a movement back and forth. See
        [twirling T-tetsons II](/patterns/twirling-t-tetsons-ii) for a variation on this idea.  By other means
        the replication of the pre-pulsar can be made to occur in just 14
        generations as half of it is eaten; this allows the construction of
        p28 and p29 oscillators.  The pre-pulsar was also a vital component
        of the first known p26 and p47 oscillators.
        See also [PPS](/patterns/pps).
