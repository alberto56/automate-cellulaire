      The mechanism defining the rate of
      travel of the [Centipede](/patterns/centipede) and [shield bug](/patterns/shield-bug) spaceships.  Compare
      [pi climber](/patterns/pi-climber).  It consists of a pair of [Herschel](/patterns/herschel)s climbing two
