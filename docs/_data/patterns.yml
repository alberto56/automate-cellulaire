      - "**...*......"
      - ".*.**......."
      - "...*........"
      - "...*........"
      description: |
        However, there are trivial oscillators that meet this requirement,
        but may still be considered to be [non-trivial](/patterns/non-trivial) because the
        different-period [rotor](/patterns/rotor)s are not separated by [stator](/patterns/stator) cells.  An
        example is Dean Hickerson's [trivial p6](/patterns/trivial-p6).  Conversely, there are
        oscillators formed by trivial combinations of high-period [gun](/patterns/gun)s or
        [sparker](/patterns/sparker)s that are only technically non-trivial, because the
        lower-period components overlap but do not interact in any way.
        "Trivial" is also used to describe a [parent](/patterns/parent) of an object which
        has groups of cells that can be removed without changing the result,
        such as isolated faraway cells.  For example, here is a trivial
        parent of a block.
