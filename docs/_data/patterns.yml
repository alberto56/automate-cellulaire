      - ".**................"
      - "..*................"
      - ".*................."
      - "..................."
      - ".......**.........."
      - "......**..........."
      - "........*.........."
      - "..................."
      - "..................."
      - "..................."
      - "..................."
      - "..................."
      - "..................."
      - "..................."
      - "..**..............."
      - ".*.*..............."
      - "...*..............."
      - "..................."
      - "................***"
      - "................*.."
      - ".................*."
      description: |
        Running the above for 20 ticks completes a [kickback](/patterns/kickback) reaction with
        the top two gliders, resulting in the three-glider switch engine
        recipe discovered by Luka Okanishi on 12 March 2017.
