      parallels with the game of Life.  This book brought to a wider
      audience many of the results that first appeared in [LifeLine](/patterns/lifeline).  It
      also outlines the proof of the existence of a [universal constructor](/patterns/universal-constructor)
      in Life first given in [Winning Ways](/patterns/winning-ways).
