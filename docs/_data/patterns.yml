      it:  [push](/patterns/push), [pull](/patterns/pull), or [fire](/patterns/fire) for simple construction arms, along
      with possible construct, duplicate-elbow, or delete-elbow ops for
      more complicated systems.  See [construction elbow](/patterns/construction-elbow).
