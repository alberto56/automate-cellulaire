  - name: burn
    id: burn
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A reaction which travels indefinitely as a [wave](/patterns/wave) through the
      components of a [wick](/patterns/wick) or an [agar](/patterns/agar).  A burning wick is known as a
      [fuse](/patterns/fuse).
      If the object being burned has a spatial periodicity, then the
      active area of the burning usually remains bounded and so eventually
      develops a periodicity too.  It is unknown whether this will always
      occur.
      The speed of burning can range from arbitrarily slow up to the
      [speed of light](/patterns/speed-of-light).  The results of burning can be clean (leaving no
      debris), or leaving debris usually much different from the original
      object.  In rare cases, a [reburnable fuse](/patterns/reburnable-fuse) produces an exact copy of
      the original object, allowing the creation of objects such as the
      [telegraph](/patterns/telegraph).
      In many useful cases burning can be initiated by impacting an
      object with [glider](/patterns/glider)s or other [spaceship](/patterns/spaceship)s.  An object might be able
      to burn in more than one way, depending on how the burn is initiated.
