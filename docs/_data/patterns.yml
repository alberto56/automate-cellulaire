    description: |
      To join two or more [still life](/patterns/still-life)s or [oscillator](/patterns/oscillator)s together.
      This is often done in order to fit the objects into a smaller space
      than would otherwise be possible.  The simplest useful example is
      probably the [integral sign](/patterns/integral-sign), which can be considered as a pair of
      welded [eater1](/patterns/eater1)s.
