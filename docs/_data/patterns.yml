      changes: {}
    description: |
      An object that moves like a [spaceship](/patterns/spaceship), except
      that its front part moves faster than its back part and a [wick](/patterns/wick)
      extends between the two.  Put another way, a growing spaceship is a
      [puffer](/patterns/puffer) whose output is burning [clean](/patterns/clean)ly at a slower rate than the
      puffer is producing it.  Examples include [blinker ship](/patterns/blinker-ship)s,
      [pi ship](/patterns/pi-ship)s, and some [wavestretcher](/patterns/wavestretcher)s.
  - name: G-to-H
    id: g-to-h
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A [converter](/patterns/converter) that takes a [glider](/patterns/glider) as an input [signal](/patterns/signal) and
      produces a [Herschel](/patterns/herschel) output, which can then be used by other
      [conduit](/patterns/conduit)s.  G-to-Hs are frequently used in [stable](/patterns/stable) logic circuitry.
      Early examples include [Callahan G-to-H](/patterns/callahan-g-to-h), [Silver G-to-H](/patterns/silver-g-to-h), and
      [p8 G-to-H](/patterns/p8-g-to-h) for periodic circuits.  A more compact recent example is
      the [syringe](/patterns/syringe).
