    description: |
      Common patterns of four identical objects.  The five
      commonest are [traffic light](/patterns/traffic-light) (4 blinkers), [honey farm](/patterns/honey-farm) (4
      beehives), [blockade](/patterns/blockade) (4 blocks), [fleet](/patterns/fleet) (4 ships, although really 2
      ship-ties) and [bakery](/patterns/bakery) (4 loaves, although really 2 bi-loaves).
      Also sometimes included is [four skewed blocks](/patterns/four-skewed-blocks).
  - name: fanout
