    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A 65-cell quadratic growth pattern found by Nick Gotts in March
      2000.  This (and a related 65-cell pattern which Gotts found at about
      the same time) beat the record previously held by [mosquito5](/patterns/mosquito5) for
      smallest population known to have superlinear growth, but was later
      superseded by [catacryst](/patterns/catacryst).  See [switch-engine ping-pong](/patterns/switch-engine-ping-pong) for the
      lowest-population [superlinear growth](/patterns/superlinear-growth) pattern as of July 2018, along
      with a list of the record-holders.
  - name: telegraph
    id: telegraph
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A pattern created by Jason Summers in February 2003.  It
      transmits and receives information using a rare type of
      [reburnable fuse](/patterns/reburnable-fuse), a [lightspeed wire](/patterns/lightspeed-wire) made from a chain of beehives,
      at the rate of 1440 ticks per bit.  The rate of travel of signals
      through the entire [transceiver](/patterns/transceiver) device can be increased to any speed
      strictly less than the [speed of light](/patterns/speed-of-light) by increasing the length of
      the beehive chain appropriately.
      "Telegraph" may also refer to any device that sends and receives
      lightspeed signals; see also [p1 telegraph](/patterns/p1-telegraph),
      [high-bandwidth telegraph](/patterns/high-bandwidth-telegraph).
