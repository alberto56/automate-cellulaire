      description: |
        Of the reactions on the first row, the glider output is the same
        [parity](/patterns/parity) for all but the long boat. The three still lifes are all
        [colour-changing](/patterns/colour-changing), but the [toad](/patterns/toad) happens to be a [colour-preserving](/patterns/colour-preserving)
        turner.  The third row shows an [aircraft carrier](/patterns/aircraft-carrier) serving as a
        "0-degree turner" that is also colour-changing.
        Three of the simplest 180-degree turners are shown in the second
        row. The [Blockic](/patterns/blockic) 180-degree turner is colour-preserving. The
        [long boat](/patterns/long-boat) and [long ship](/patterns/long-ship) are again colour-changing; this is
        somewhat counterintuitive as the output glider is on exactly the same
        [lane](/patterns/lane) as the input glider, but gliders travelling in opposite
        directions on the same lane always have opposite colours.
        Many small one-time turner [constellation](/patterns/constellation)s have also been
        catalogued. The 90-degree two-block turner on the right, directly
        below the toad, is also colour-changing but has the opposite parity.
        A one-time turner reaction can be used as part of a glider
        [inject](/patterns/inject)ion mechanism, or as a switching mechanism for a [signal](/patterns/signal).
        If a previous reaction has created the sacrificial object, then a
        later glider is turned onto a new path.  Otherwise it passes through
        the area unaffected.  This is one way to create simple switching
        systems or logic [circuit](/patterns/circuit)s.  An example is shown in [demultiplexer](/patterns/demultiplexer).
