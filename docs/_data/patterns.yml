      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A 58-cell [quadratic growth](/patterns/quadratic-growth) pattern found by Nick Gotts in
      April 2000.  This was formerly the smallest such pattern known, but
      has since been superseded by the related [metacatacryst](/patterns/metacatacryst).  See
      [switch-engine ping-pong](/patterns/switch-engine-ping-pong) for the lowest-population
      [superlinear growth](/patterns/superlinear-growth) pattern as of July 2018, along with a list of
      the record-holders.
      The catacryst consists of three [ark](/patterns/ark)s plus a glider-producing
      [switch engine](/patterns/switch-engine).  It produces a block-laying switch engine every
      47616 generations.  Each block-laying switch engine has only a finite
      life, but the length of this life increases linearly with each new
      switch engine, so that the pattern overall grows quadratically, as an
      unusual type of MMS [breeder](/patterns/breeder).
  - name: Catagolue
    id: catagolue
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      An online database of objects in Conway's Game of Life and
      similar cellular automata, set up by Adam P. Goucher in 2015 at
      [http://catagolue.appspot.com](/patterns/http://catagolue.appspot.com). It gathers data from a distributed
      search of random initial configurations and records the eventual
      decay products.  Within a year of operation it had completed a
      [census](/patterns/census) of the [ash](/patterns/ash) objects from over two trillion asymmetric 16x16
      [soup](/patterns/soup)s.  As of June 2018, well over two hundred trillion ash objects
      have been counted, from over a trillion asymmetric soups.
      It is often possible to use Catagolue search results find
      equivalent [glider synthesis](/patterns/glider-synthesis) recipes for selected parts of
      long-running active reactions.  These random [soup](/patterns/soup) searches have
      made it possible to find efficient construction methods for thousands
      of increasingly rare [still life](/patterns/still-life)s and [oscillator](/patterns/oscillator)s, and the
      occasional [puffer](/patterns/puffer) or [spaceship](/patterns/spaceship).  In many of these cases a
      [glider synthesis](/patterns/glider-synthesis) was previously very difficult or unknown.
  - name: catalyst
    id: catalyst
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      An object that participates in a reaction but emerges from
      it unharmed.  All [eater](/patterns/eater)s are catalysts.  Some small [still life](/patterns/still-life)s
      can act as catalysts in some situations, such as the [block](/patterns/block), [ship](/patterns/ship),
      and [tub](/patterns/tub).  The still lifes and oscillators that form a [conduit](/patterns/conduit) are
      examples of catalysts.
      A relatively rare form of catalysis occurs in a
      [transparent debris effect](/patterns/transparent-debris-effect), where the catalyst in question is
      completely destroyed and then rebuilt.  The term is also sometimes
      used for a modification of an active reaction in a [rake](/patterns/rake) by passing
      [spaceship](/patterns/spaceship)s.
