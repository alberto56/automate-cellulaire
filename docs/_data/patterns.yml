    description: |
      Two thirds of the speed of light - the speed of signals in a
      [2c/3 wire](/patterns/2c/3-wire) or of some [against the grain](/patterns/against-the-grain) [negative spaceship](/patterns/negative-spaceship)
      signals in the [zebra stripes](/patterns/zebra-stripes) [agar](/patterns/agar), and also the speed of
      [burn](/patterns/burn)ing of the [blinker fuse](/patterns/blinker-fuse) and the [bi-block fuse](/patterns/bi-block-fuse).
  - name: 2c/3-wire
    id: 2c-3-wire
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A [wire](/patterns/wire) discovered by Dean Hickerson in March 1997, using
      his [dr](/patterns/dr) [search program](/patterns/search-program).  It supports [signal](/patterns/signal)s that travel through
      the wire diagonally at two thirds of the [speed of light](/patterns/speed-of-light). Each 2c/3 signal is made up of two half-signals that can be
      separated from each other by an arbitrary number of [tick](/patterns/tick)s.
      Considerable effort has been spent on finding a way to turn a 2c/3
      signal 90 or 180 degrees, since this would by one way to prove Life
      to be [omniperiodic](/patterns/omniperiodic).  There is a known 2c/3 converter shown under
      [signal elbow](/patterns/signal-elbow), which converts a standard 2c/3 signal into a
      double-length signal.  This is usable in some situations, but
      unfortunately it fails when its input is a double-length signal, so
      it can't be used to complete a loop.
      Noam Elkies discovered a glider synthesis of a reaction that can
      repeatably insert a signal into the upper end of a 2c/3 wire.  See
      [stable pseudo-Heisenburp](/patterns/stable-pseudo-heisenburp) for details.  On 11 September 2017, Martin
      Grant reduced the input reaction to five gliders, or three gliders
      plus a [Herschel](/patterns/herschel).  With the Herschel option the [recovery time](/patterns/recovery-time) is
      152 ticks.
      See also [5c/9 wire](/patterns/5c/9-wire).
