      - "..*...................*...................*....."
      - "*.*.................*.*.................*.*....."
      - ".**..*...............**..*...............**..*.."
      - ".....*.*.................*.*.................*.*"
      - ".....**..................**..................**."
      - "................................................"
      - "................................................"
      - "....................*..........................."
      - "...*..*............*.*.*..*............**..*..*."
      - "...****.............**.****............*...****."
      - "......................*.................***....."
      - ".....**...............*.*.................*.*..."
      - ".....**................*.*.................**..."
