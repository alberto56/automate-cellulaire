    description: |
      The individual [polyplet](/patterns/polyplet)s of which a [stable](/patterns/stable) pattern
      consists are sometimes called islands.  So, for example, a [boat](/patterns/boat) has
      only one island, while an [aircraft carrier](/patterns/aircraft-carrier) has two, a [honey farm](/patterns/honey-farm)
      has four and the standard form of the [eater3](/patterns/eater3) has five.
