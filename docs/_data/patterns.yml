      A pattern which can be used as the main component of a
      [puffer](/patterns/puffer).  The pattern may itself be a puffer (e.g. the classic
      [puffer train](/patterns/puffer-train)), it may be a spaceship (e.g. the [Schick engine](/patterns/schick-engine)), or
      it may even be unstable (e.g. the [switch engine](/patterns/switch-engine)).
