  - name: rle
    id: rle
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      Run-length encoded.  Run-length encoding is a simple (but not
      very efficient) method of file compression.  In Life the term refers
      to a specific ASCII encoding used for patterns in Conway's Life and
      other similar cellular automata.  This encoding was introduced by
      Dave Buckingham and is now the usual means of exchanging relatively
      small patterns by email or in online forum discussions.
      As an example of the rle format, here is a representation of the
      [Gosper glider gun](/patterns/gosper-glider-gun).  The "run lengths" are the numbers, b's are dead
      cells, o's are live cells, and dollar signs signal new lines: x = 36, y = 9, rule = B3/S23  	  24bo$22bobo$12boo6boo12boo$11bo3bo4boo12boo$oo8bo 5bo3boo$oo8bo3boboo4bobo$10bo5bo7bo$11bo3bo$12boo! Over the years RLE format has been extended to handle patterns with    multiple states, neighborhoods, rules, and universe sizes.  A completely different encoding, [macrocell](/patterns/macrocell) format, is used for
      repetitive patterns that may have very large [population](/patterns/population)s.
