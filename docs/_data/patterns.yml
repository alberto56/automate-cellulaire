  - name: pseudo-random glider generator
    id: pseudo-random-glider-generator
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A [pseudo-random number generator](/patterns/pseudo-random-number-generator) in
      which the bits are represented by the presence or absence of
      [glider](/patterns/glider)s.  The first pseudo-random glider generator was built by
      Bill Gosper.  David Bell built the first moving one in 1997, using
      c/3 [rake](/patterns/rake)s.
  - name: pseudo-random number generator
    id: pseudo-random-number-generator
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A pseudo-random number generator
      (PRNG) is an algorithm that produces a sequence of bits that looks
      random (but cannot really be random, being algorithmically
      determined).
      In Life, the term refers to a PRNG implemented as a Life pattern,
      with the bits represented by the presence or absence of objects such
      as [glider](/patterns/glider)s or [block](/patterns/block)s.  Such a PRNG usually contains gliders or
      other [spaceship](/patterns/spaceship)s in a loop with a feedback mechanism that causes
      later spaceships to interfere with the generation of earlier
      spaceships.  The [period](/patterns/period) can be very high, as a loop of n spaceships
      has 2^n possible states.
  - name: pseudo still life
    id: pseudo-still-life
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A [stable](/patterns/stable) pattern whose live cells are either
      immediately adjacent to each other, or are connected into a single
      group by adjacent dead cells where birth is suppressed by
      overpopulation.
      The definition of [strict still life](/patterns/strict-still-life) rules out such stable
      patterns as the [bi-block](/patterns/bi-block).  In such patterns there are dead cells
      which have more than 3 neighbours in total, but fewer than 3 in any
      component still life.  These patterns are called pseudo still lifes,
      and have been enumerated up to 32 bits, as shown in the table below.
      ```
      --------------
      Bits    Number
      --------------
      8           1
      9           1
      10           7
      11          16
      12          55
      13         110
      14         279
      15         620
      16        1645
      17        4067
      18       10843
      19       27250
      20       70637
      21      179011
      22      462086
      23     1184882
      24     3068984
      25     7906676
      26    20463274
      27    52816265
      28   136655095
      29   353198379
      30   914075620
      31  2364815358
      32  6123084116
      --------------
      ```
      Attribution of these counts is given in [strict still life](/patterns/strict-still-life); see
      also [https://oeis.org/A056613](/patterns/https://oeis.org/a056613).  The unique 32-bit [triple pseudo](/patterns/triple-pseudo)
      still life is included in the last count in the table.  As the number
      of bits increases, the pseudo still life count goes up exponentially
      by approximately O(2.56^n).  By comparison, the rate for
      [strict still life](/patterns/strict-still-life)s is about O(2.46^n) while for [quasi still life](/patterns/quasi-still-life)s
      it's around O(3.04^n).
      If a stable pattern's live cells plus its overpopulated dead cells
      do not form a single mutually adjacent group, the pattern is usually
      referred to as a [constellation](/patterns/constellation).  It is also a [still life](/patterns/still-life) in the
      general sense, but is neither "pseudo" nor "strict".
  - name: puffer
    id: puffer
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      An object that moves like a [spaceship](/patterns/spaceship), except that it leaves
      debris behind.  The first known puffers were found by Bill Gosper and
      travelled at c/2 orthogonally (see diagram below for the very first
      one, found in 1971).
    variants:
    - pattern:
      - ".***......*.....*......***."
      - "*..*.....***...***.....*..*"
      - "...*....**.*...*.**....*..."
      - "...*...................*..."
      - "...*..*.............*..*..."
      - "...*..**...........**..*..."
      - "..*...**...........**...*.."
      description: |
        Not long afterwards c/12 diagonal puffers were found (see
        [switch engine](/patterns/switch-engine)).  Discounting [wickstretcher](/patterns/wickstretcher)s, which are not
        puffers in the conventional sense, no new velocity was obtained after
        this until David Bell found the first c/3 orthogonal puffer in April
        1996.  Other new puffer speeds followed over the next several years.
        Many spaceships that travel orthogonally at a speed less than c/2
        have useful side or back [spark](/patterns/spark)s.  These can be used to perturb
        [standard spaceship](/patterns/standard-spaceship)s that approach from behind.  A common technique
        for creating puffers for a new speed uses a [convoy](/patterns/convoy) of the new
        spaceships to create debris from an approaching standard spaceship
        such that a new standard spaceship is recreated on the same path as
        the original one.  This forms a closed loop, resulting in a
        high-period puffer for the new speed.
        As of June 2018, puffers have been found matching every known
        velocity of [elementary](/patterns/elementary) spaceship, except for c/6 and c/7 diagonal
        and (2,1)c/6.  It is also generally easy to create puffers based on
        [macro-spaceship](/patterns/macro-spaceship)s, simply by removing some part of the trailing
        cleanup mechanism.
  - name: puffer engine
    id: puffer-engine
    source:
