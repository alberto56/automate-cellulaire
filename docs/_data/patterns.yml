    description: |
      Any [spaceship](/patterns/spaceship) other than a [glider](/patterns/glider), [LWSS](/patterns/lwSs),
      [MWSS](/patterns/mwSs) or [HWSS](/patterns/hwSs).
  - name: non-trivial
    id: non-trivial
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A non-trivial period-N [oscillator](/patterns/oscillator) contains at least one
      cell that oscillates at the full period.  In other words, it is not
      made up solely of separate oscillators with smaller periods. Usually
      it includes a [spark](/patterns/spark) or other reaction that would not occur if all
      lower-period subpatterns were separated from each other, but some
      exceptions are given under [trivial](/patterns/trivial).  See also [omniperiodic](/patterns/omniperiodic).
  - name: novelty generator
    id: novelty-generator
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A pattern that appears to have an [unknown fate](/patterns/unknown-fate)
      due to complex feedback loops, for example involving [wave](/patterns/wave)s of
      gliders shuttling between perpendicular [rake](/patterns/rake)s.  Novelty generator
      patterns fall short of counting as [chaotic growth](/patterns/chaotic-growth), since the rakes
      continue to be predictable, and much of their [ash](/patterns/ash) generally remains
      stable.
      It has not been proven conclusively that any particular pattern is
      in fact an infinite novelty generator, since it is always possible
      that periodicity will spontaneously arise if the simulation is
      continued far enough.  In fact this happens quite regularly.  But
      conversely, it has not been proven that periodicity must
      spontaneously arise for all such patterns.  Bill Gosper, Nick Gotts
      and others have done extensive experiments along these lines using
      [Golly](/patterns/golly).
  - name: NW31
    id: nw31
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      One of the most common stable [edge shooter](/patterns/edge-shooter)s.  This
      [Herschel-to-glider](/patterns/herschel-to-glider) [converter](/patterns/converter) suppresses the junk ordinarily left
      behind by an evolving [Herschel](/patterns/herschel) while allowing both the
      [first natural glider](/patterns/first-natural-glider) and [second natural glider](/patterns/second-natural-glider) to escape on
      [transparent lane](/patterns/transparent-lane)s.
    variants:
    - pattern:
      - ".*......................."
      - ".*......................."
      - ".*.*....................."
      - "..**....................."
      - "........................."
      - "........................."
      - "........................."
      - ".......................**"
      - ".......................**"
      - "........................."
      - "..*......................"
      - "..*.*...................."
      - "..***...................."
      - "....*...................."
      - "........................."
      - "........................."
      - "........................."
      - "........................."
      - "........................."
      - "........................."
      - "........................."
      - "...........**............"
      - "............*............"
      - ".........***............."
      - ".........*..............."
      description: |
        The edge shooter output at the top has no additional [clearance](/patterns/clearance), so
        its use in creating [convoy](/patterns/convoy)s is limited:  it can only add gliders on
        the outermost lanes of an existing glider [salvo](/patterns/salvo).  Like the beehive
        version of [SW-2](/patterns/sw-2), either output can be used to build logical OR
        gates, where multiple input [signal](/patterns/signal) paths are merged onto the same
        output path.
        The complete name for this converter is "NW31T120", where 31 is the
        output glider lane number.  In the above orientation, lane numbers
        get bigger toward the upper right and smaller toward the lower left
        (and may easily be negative).
        The T120 timing measurement means that a canonical NW glider placed
        on lane 31 at time T=120, at (+31, +0) relative to the input
        Herschel, would in theory reach the exact same spacetime locations as
        the converter's output glider does.
        Most converters are not edge shooters and their output lanes are
        not transparent, so they usually have catalysts that would interfere
        with this theoretically equivalent glider.  This is the case for the
        optional third glider output created by the lower [eater1](/patterns/eater1) catalyst:
        the upper eater1 overlaps its [lane](/patterns/lane).  For the alternate [block](/patterns/block)
        catalyst suppressing this glider output, see [transparent lane](/patterns/transparent-lane).
