    description: |
      In signal circuitry, a term used for a [catalyst](/patterns/catalyst) that is
      completely destroyed by the passing signal, then rebuilt.  Often
      (though not always) the active reaction passes directly through the
      area occupied by the transparent catalyst, then rebuilds the catalyst
      behind itself, as in the [transparent block reaction](/patterns/transparent-block-reaction).  See also
      [transparent lane](/patterns/transparent-lane).
