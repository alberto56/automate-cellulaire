      description: |
        The switching signal here is a glider produced by a high-clearance
        [syringe](/patterns/syringe) variant found by Matthias Merzenich.  The syringe is not
        technically part of the switch mechanism; any standard [Herschel](/patterns/herschel)
        source can deliver the signal to the block [factory](/patterns/factory) (the two
        [eater1](/patterns/eater1)s on the right side of the pattern).  Alternate [converter](/patterns/converter)
        mechanisms could also be used to place the block.
        An earlier example of the same type of one-time switch mechanism,
        also mediated by a block, can be found in the NW34T204 [H-to-G](/patterns/h-to-g).  See
        also [bistable switch](/patterns/bistable-switch) for a very robust and versatile toggle switch
        with two input [lane](/patterns/lane)s and four possible outputs.
