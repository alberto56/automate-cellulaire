  - name: true
    id: true
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      Opposite of [pseudo](/patterns/pseudo).  A [gun](/patterns/gun) emitting a period n stream of
      [spaceship](/patterns/spaceship)s (or [rake](/patterns/rake)s) is said to be a true period n gun if its
      mechanism oscillates with period n.  The same distinction between
      true and pseudo also exists for [puffer](/patterns/puffer)s.  An easy way to check that
      a gun is true period n is to stop the output with an [eater](/patterns/eater), and
      check that the result is a period-n [oscillator](/patterns/oscillator).
      True period n guns are known to exist for all periods greater than
      61 (see [My Experience with B-heptominos in Oscillators](/patterns/my-experience-with-b-heptominos-in-oscillators)), but only a
      few smaller periods have been achieved, namely 20, 22, 24, 30, 36,
      40, 44, 45, 46, 48, 50, and 54 through 61.  See also [Quetzal](/patterns/quetzal) for
      the 54-61 range.
