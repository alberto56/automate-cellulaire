  - name: sparse Life
    id: sparse-life
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      This refers to the study of the evolution of a Life
      universe which starts off as a random [soup](/patterns/soup) of extremely low
      density.  Such a universe is dominated at an early stage by [block](/patterns/block)s
      and [blinker](/patterns/blinker)s (often referred to collectively as [blonk](/patterns/blonk)s) in a
      ratio of about 2:1.  Much later it will be dominated by simple
      [infinite growth](/patterns/infinite-growth) patterns (presumably mostly [switch engine](/patterns/switch-engine)s).  The
      long-term fate of a sparse Life universe is less certain.  It may
      possibly become dominated by self-reproducing patterns (see
      [universal constructor](/patterns/universal-constructor)), but it is not at all clear that there is
      any mechanism for these to deal with all the junk produced by switch
      engines.
  - name: Spartan
    id: spartan
    source:
      url: https://conwaylife.com/ref/lexicon/lex_home.htm
      desc: Life Lexicon Home Page, Conwaylife.com
      license: https://creativecommons.org/licenses/by-sa/3.0/
      changes: {}
    description: |
      A pattern composed of subunits that can be easily constructed
      in any orientation, usually with a [slow salvo](/patterns/slow-salvo). Generally this means
      that the pattern is a [constellation](/patterns/constellation) of Spartan still lifes:
      [block](/patterns/block), [tub](/patterns/tub), [boat](/patterns/boat), [hive](/patterns/hive), [ship](/patterns/ship), [loaf](/patterns/loaf), [eater1](/patterns/eater1), or [pond](/patterns/pond).
      Other small objects may sometimes be counted as Spartan, including
      period-2 oscillators - mainly [blinker](/patterns/blinker)s, but also [beacon](/patterns/beacon)s or
      [toad](/patterns/toad)s, which may occur as [intermediate target](/patterns/intermediate-target)s in slow salvo
      [recipe](/patterns/recipe)s.  Most [self-constructing](/patterns/self-constructing) patterns are Spartan or mostly
      Spartan, to simplify the process of self-construction.
  - name: speed booster
